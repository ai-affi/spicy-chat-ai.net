<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="description" content="SpicyChat AI Review">
  <meta name="keywords" content="spicychat, ai chatbot">
  <meta property="og:title" content="SpicyChat AI">
  <meta property="og:description" content="SpicyChat AI Review">
  <meta name="twitter:title" content="SpicyChat AI">
  <meta name="twitter:description" content="SpicyChat AI Review">
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="dns-prefetch" href="https://spicychat.ai">
  <link rel="canonical" href="https://spicy-chat-ai.net/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preload" as="image" href="/images/hero_banner.webp" type="image/webp" fetchpriority="high">
  <style>
    :root{--primary:#e11d48;--secondary:#7c3aed;--bg-dark:#0f0a0f;--bg-card:#1a1015;--text-primary:#fff;--text-secondary:#a1a1aa;--border:#3f1825}
    body{background:var(--bg-dark);color:var(--text-primary);font-family:'Inter',system-ui,-apple-system,sans-serif}
    .gradient-bg{background:linear-gradient(135deg,#0f0a0f 0%,#1a0a12 50%,#0f0a0f 100%)}
    .gradient-bg-2{background:linear-gradient(135deg,#1a0a12 0%,#0f0a0f 100%)}
    .accent-color{color:var(--primary)}
    .accent-bg{background:var(--primary)}
    .accent-border{border-color:var(--primary)}
    .cta-pulse{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(225,29,72,.7)}70%{box-shadow:0 0 0 20px rgba(225,29,72,0)}}
    .glow-text{text-shadow:0 0 20px rgba(225,29,72,.5)}
    .card-hover{transition:all .3s ease}
    .card-hover:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(225,29,72,.2)}
    .star-rating{color:#fbbf24}
    .review-card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px)}
    .bot-card{transition:all .3s ease;overflow:hidden;border-radius:12px}
    .bot-card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(225,29,72,.3)}
    .bot-img{aspect-ratio:640/832;width:100%;object-fit:cover;object-position:top}
    .hero-section{display:flex;align-items:center;gap:2rem;max-width:1200px;margin:0 auto;padding:4rem 1rem}
    .hero-banner{flex:0 0 45%;max-width:500px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(225,29,72,.3)}
    .hero-banner img{width:100%;height:auto;display:block}
    .hero-text{flex:1;text-align:left}
    @media(max-width:768px){.hero-section{flex-direction:column;text-align:center;padding:2rem 1rem}.hero-banner{flex:0 0 auto;width:100%;max-width:400px;margin:0 auto}.hero-text{text-align:center}}
  </style>
</head>
<body class="font-sans">
  <nav class="bg-gray-900/90 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex-shrink-0 flex items-center">
          <span id="nav-brand" class="text-2xl font-bold bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent"></span>
        </div>
        <div id="nav-links" class="hidden md:flex space-x-6 text-sm"></div>
        <a href="/go/spicychat" class="affiliate-link inline-flex items-center px-4 py-2 bg-gradient-to-r from-rose-500 to-purple-600 text-white font-semibold rounded-lg hover:from-rose-600 hover:to-purple-700 transition text-sm" rel="nofollow noreferrer noopener" id="nav-cta"></a>
      </div>
    </div>
  </nav>

  <section class="gradient-bg">
    <div class="hero-section">
      <div class="hero-banner">
        <img src="/images/hero_banner.webp" alt="" fetchpriority="high" decoding="async" width="817" height="687" id="hero-img" />
      </div>
      <div class="hero-text">
        <div class="inline-block mb-4 px-4 py-1 rounded-full bg-rose-500/20 border border-rose-500/40 text-rose-300 text-sm font-medium" id="hero-badge"></div>
        <h1 class="text-4xl lg:text-6xl font-extrabold mb-6 leading-tight glow-text" id="hero-title"></h1>
        <p class="text-lg lg:text-xl mb-8 text-gray-300 max-w-xl leading-relaxed" id="hero-subtitle"></p>
        <div class="flex flex-col sm:flex-row gap-4 justify-start mb-6">
          <a href="/go/spicychat" class="affiliate-link cta-pulse inline-flex items-center justify-center px-8 py-4 bg-gradient-to-r from-rose-500 to-purple-600 text-white font-bold text-lg rounded-xl hover:from-rose-600 hover:to-purple-700 transition transform hover:scale-105 shadow-lg shadow-rose-500/30" rel="nofollow noreferrer noopener" id="hero-cta-primary"></a>
          <a href="#features" class="inline-flex items-center justify-center px-8 py-4 border-2 border-rose-500/50 text-rose-300 font-bold text-lg rounded-xl hover:bg-rose-500/10 transition" id="hero-cta-secondary"></a>
        </div>
        <div class="flex flex-col sm:flex-row items-start gap-4 text-sm text-gray-400" id="hero-proof"></div>
      </div>
    </div>
  </section>

  <section id="features" class="py-20 gradient-bg-2">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl lg:text-4xl font-bold mb-4 text-center" id="features-title"></h2>
      <p class="text-center text-gray-400 mb-12 max-w-2xl mx-auto" id="features-subtitle"></p>
      <div id="features-grid" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>
  </section>

  <section class="py-20 bg-gray-900">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl lg:text-4xl font-bold mb-12 text-center" id="hiw-title"></h2>
      <div id="hiw-grid" class="grid md:grid-cols-3 gap-8"></div>
    </div>
  </section>

  <section id="popular-bots" class="py-20 gradient-bg-2">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl lg:text-4xl font-bold mb-4 text-center" id="bots-title"></h2>
      <p class="text-center text-gray-400 mb-12 max-w-2xl mx-auto" id="bots-subtitle"></p>
      <div id="bots-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </section>

  <section id="pricing" class="py-20 bg-gray-900">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl lg:text-4xl font-bold mb-4 text-center" id="pricing-title"></h2>
      <p class="text-center text-gray-400 mb-12 max-w-2xl mx-auto" id="pricing-subtitle"></p>
      <div id="pricing-grid" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
      <p class="text-center text-gray-500 text-sm mt-8" id="pricing-note"></p>
    </div>
  </section>

  <section id="alternatives" class="py-20 gradient-bg-2">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl lg:text-4xl font-bold mb-4 text-center" id="comp-title"></h2>
      <p class="text-center text-gray-400 mb-12 max-w-2xl mx-auto" id="comp-subtitle"></p>
      <div id="comp-cards" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12"></div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="comp-table"></table>
      </div>
    </div>
  </section>

  <section class="py-20 bg-gray-900">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl lg:text-4xl font-bold mb-12 text-center" id="reviews-title"></h2>
      <div id="reviews-grid" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>
  </section>

  <section id="faq" class="py-20 gradient-bg-2">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl lg:text-4xl font-bold mb-12 text-center" id="faq-title"></h2>
      <div id="faq-list" class="space-y-4"></div>
    </div>
  </section>

  <section class="py-20 gradient-bg">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h2 class="text-4xl lg:text-5xl font-bold mb-6 glow-text" id="final-title"></h2>
      <p class="text-xl text-gray-300 mb-8 max-w-2xl mx-auto" id="final-subtitle"></p>
      <a href="/go/spicychat" class="affiliate-link cta-pulse inline-flex items-center justify-center px-12 py-5 bg-gradient-to-r from-rose-500 to-purple-600 text-white font-bold text-xl rounded-xl hover:from-rose-600 hover:to-purple-700 transition transform hover:scale-105 shadow-lg shadow-rose-500/30" rel="nofollow noreferrer noopener" id="final-cta"></a>
      <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-6 text-sm text-gray-400" id="final-proof"></div>
    </div>
  </section>

  <footer class="bg-gray-950 border-t border-gray-800 py-12">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div id="footer-grid" class="grid md:grid-cols-3 gap-8 mb-8"></div>
      
      <!-- Language Selector -->
      <div class="border-t border-gray-800 pt-6 mb-6">
        <div class="flex flex-wrap items-center justify-center gap-2">
          <span class="text-gray-500 text-sm mr-2">🌐 Language:</span>
          <a href="/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="es">English</a>
          <a href="/fr/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="fr">Français</a>
          <a href="/de/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="de">Deutsch</a>
          <a href="/es/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="es">Español</a>
          <a href="/pt-br/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="pt">Português</a>
          <a href="/nl/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="nl">Nederlands</a>
          <a href="/it/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="it">Italiano</a>
          <a href="/jp/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="ja">日本語</a>
          <a href="/kr/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="ko">한국어</a>
          <a href="/ru/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="ru">Русский</a>
          <a href="/hi/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="hi">हिन्दी</a>
          <a href="/tr/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="tr">Türkçe</a>
          <a href="/ar/" class="lang-link px-3 py-1 rounded-full text-sm transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-lang="ar">العربية</a>
        </div>
      </div>
      
      <div class="border-t border-gray-800 pt-8 text-center text-sm text-gray-500">
        <p id="footer-copy"></p>
        <p class="mt-2" id="footer-disc"></p>
      </div>
    </div>
  </footer>

  <script>

fetch('content.es.json')
  .then(r => r.json())
  .then(c => {
    // Meta
    document.title = c.meta.title;
    document.querySelector('meta[name="description"]').content = c.meta.description;
    document.querySelector('meta[name="keywords"]').content = c.meta.keywords;
    document.querySelector('meta[property="og:title"]').content = c.meta.og_title;
    document.querySelector('meta[property="og:description"]').content = c.meta.og_description;
    document.querySelector('meta[name="twitter:title"]').content = c.meta.og_title;
    document.querySelector('meta[name="twitter:description"]').content = c.meta.og_description;

    // Nav
    document.getElementById('nav-brand').textContent = c.nav.brand;
    document.getElementById('nav-cta').textContent = c.nav.cta;
    const navLinks = document.getElementById('nav-links');
    c.nav.links.forEach(l => {
      const a = document.createElement('a');
      a.href = l.href;
      a.className = 'text-gray-300 hover:text-rose-400 transition';
      a.textContent = l.text;
      navLinks.appendChild(a);
    });

    // Hero
    document.getElementById('hero-img').alt = c.hero.subtitle.slice(0, 80);
    document.getElementById('hero-badge').textContent = c.hero.badge;
    document.getElementById('hero-title').textContent = c.hero.title;
    document.getElementById('hero-subtitle').textContent = c.hero.subtitle;
    document.getElementById('hero-cta-primary').textContent = c.hero.cta_primary;
    document.getElementById('hero-cta-secondary').textContent = c.hero.cta_secondary;
    const heroProof = document.getElementById('hero-proof');
    c.hero.social_proof.forEach(p => {
      const s = document.createElement('span');
      s.className = 'flex items-center gap-1';
      s.innerHTML = '<span class="text-green-400">✓</span> ' + p;
      heroProof.appendChild(s);
    });

    // Features
    document.getElementById('features-title').innerHTML = c.features.title.replace('Leads', '<span class="bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent">Leads</span>');
    document.getElementById('features-subtitle').textContent = c.features.subtitle;
    const featGrid = document.getElementById('features-grid');
    c.features.items.forEach(f => {
      featGrid.innerHTML += '<div class="bg-gray-800 rounded-xl p-6 border border-gray-700 card-hover"><div class="text-3xl mb-3">' + f.icon + '</div><h3 class="font-bold text-white mb-2">' + f.title + '</h3><p class="text-gray-400 text-sm">' + f.description + '</p></div>';
    });

    // How It Works
    document.getElementById('hiw-title').innerHTML = c.how_it_works.title.replace('3 Steps', '<span class="bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent">3 Steps</span>');
    const hiwGrid = document.getElementById('hiw-grid');
    c.how_it_works.steps.forEach(s => {
      hiwGrid.innerHTML += '<div class="text-center"><div class="w-16 h-16 rounded-full bg-gradient-to-r from-rose-500 to-purple-600 flex items-center justify-center text-2xl font-bold mx-auto mb-4">' + s.number + '</div><h3 class="text-xl font-bold text-white mb-2">' + s.title + '</h3><p class="text-gray-400">' + s.description + '</p></div>';
    });

    // Popular Bots
    document.getElementById('bots-title').innerHTML = c.popular_bots.title.replace('AI Characters', '<span class="bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent">AI Characters</span>');
    document.getElementById('bots-subtitle').textContent = c.popular_bots.subtitle;
    const botsGrid = document.getElementById('bots-grid');
    c.popular_bots.bots.forEach(b => {
      botsGrid.innerHTML += '<div class="bot-card bg-gray-800 rounded-xl overflow-hidden border border-gray-700"><div class="overflow-hidden bg-gradient-to-br from-rose-900/50 to-purple-900/50 flex items-center justify-center"><img src="' + b.image + '" alt="' + b.alt + '" class="bot-img" loading="lazy" decoding="async" width="' + b.width + '" height="' + b.height + '" /></div><div class="p-5"><h3 class="font-bold text-lg text-white">' + b.name + '</h3><p class="text-rose-400 text-sm mb-2">' + b.tagline + '</p><p class="text-gray-400 text-sm mb-3">' + b.description + '</p><div class="flex justify-between text-sm text-gray-500 mb-4"><span>💬 ' + b.chats + ' chats</span><span>⭐ ' + b.rating + ' rating</span></div><a href="/go/spicychat" class="affiliate-link block text-center py-2 bg-gradient-to-r from-rose-500 to-purple-600 text-white text-sm font-semibold rounded-lg hover:from-rose-600 hover:to-purple-700 transition" rel="nofollow noreferrer noopener">' + b.cta + '</a></div></div>';
    });

    // Pricing
    document.getElementById('pricing-title').innerHTML = c.pricing.title.replace('Plan', '<span class="bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent">Plan</span>');
    document.getElementById('pricing-subtitle').textContent = c.pricing.subtitle;
    document.getElementById('pricing-note').textContent = c.pricing.note;
    const priceGrid = document.getElementById('pricing-grid');
    c.pricing.plans.forEach(p => {
      const border = p.highlight ? 'border-2 border-rose-500 relative' : 'border border-gray-700';
      const badge = p.badge ? '<div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-rose-500 text-white text-xs font-bold px-3 py-1 rounded-full">' + p.badge + '</div>' : '';
      const btnClass = p.highlight ? 'bg-gradient-to-r from-rose-500 to-purple-600 hover:from-rose-600 hover:to-purple-700' : (p.name === "I'm All In" ? 'bg-gradient-to-r from-purple-500 to-rose-600 hover:from-purple-600 hover:to-rose-700' : 'bg-gray-700 hover:bg-gray-600');
      const feats = p.features.map(f => '<li class="flex items-center gap-2 text-gray-300"><span class="text-green-400">✓</span> ' + f + '</li>').join('');
      priceGrid.innerHTML += '<div class="bg-gray-800 rounded-2xl p-6 ' + border + '">' + badge + '<h3 class="text-xl font-bold text-white mb-2">' + p.name + '</h3><div class="text-3xl font-bold text-white mb-1">' + p.price + '</div><p class="text-gray-400 text-sm mb-4">' + p.period + '</p><ul class="space-y-2 mb-6 text-sm">' + feats + '</ul><a href="/go/spicychat" class="affiliate-link block text-center py-2 ' + btnClass + ' text-white font-semibold rounded-lg transition text-sm" rel="nofollow noreferrer noopener">' + p.cta + '</a></div>';
    });

    // Comparison
    document.getElementById('comp-title').innerHTML = c.comparison.title.replace('Alternatives', '<span class="bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent">Alternatives</span>');
    document.getElementById('comp-subtitle').textContent = c.comparison.subtitle;
    const compCards = document.getElementById('comp-cards');
    c.comparison.products.forEach(p => {
      const border = p.badge ? 'border-2 border-rose-500 relative' : 'border border-gray-700 card-hover';
      const badge = p.badge ? '<div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-rose-500 text-white text-xs font-bold px-3 py-1 rounded-full">' + p.badge + '</div>' : '';
      const cta = p.cta ? '<a href="/go/spicychat" class="affiliate-link block text-center py-2 bg-rose-500 text-white text-sm font-semibold rounded-lg hover:bg-rose-600 transition" rel="nofollow noreferrer noopener">' + p.cta + '</a>' : '';
      compCards.innerHTML += '<div class="bg-gray-800 rounded-xl p-6 ' + border + '">' + badge + '<div class="text-3xl mb-3">' + p.icon + '</div><h3 class="font-bold text-white mb-1">' + p.name + '</h3><div class="star-rating mb-2">' + p.rating + '</div><p class="text-gray-400 text-xs mb-4">' + p.description + '</p>' + cta + '</div>';
    });

    const compTable = document.getElementById('comp-table');
    let thead = '<thead><tr class="border-b border-gray-700">';
    c.comparison.table.headers.forEach((h, i) => {
      const cls = i === 0 ? 'text-left' : 'text-center';
      const col = i === 1 ? ' text-rose-400 font-bold' : (i === 0 ? ' text-gray-400' : ' text-gray-400');
      thead += '<th class="' + cls + ' py-3 px-4' + col + '">' + h + '</th>';
    });
    thead += '</tr></thead>';
    let tbody = '<tbody>';
    c.comparison.table.rows.forEach((row, ri) => {
      const bg = ri % 2 === 1 ? ' bg-rose-500/5' : '';
      tbody += '<tr class="border-b border-gray-800' + bg + '">';
      row.forEach((cell, ci) => {
        const cls = ci === 0 ? 'text-left' : 'text-center';
        const col = cell.includes('✅') ? ' text-green-400' : (cell.includes('❌') ? ' text-red-400' : (ci === 0 && ri % 2 === 1 ? ' text-white font-semibold' : ' text-gray-300'));
        tbody += '<td class="' + cls + ' py-3 px-4' + col + '">' + cell + '</td>';
      });
      tbody += '</tr>';
    });
    tbody += '</tbody>';
    compTable.innerHTML = thead + tbody;

    // Reviews
    document.getElementById('reviews-title').innerHTML = c.reviews.title.replace('Users Say', '<span class="bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent">Users Say</span>');
    const revGrid = document.getElementById('reviews-grid');
    c.reviews.items.forEach(r => {
      const stars = '⭐'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
      revGrid.innerHTML += '<div class="review-card rounded-xl p-6"><div class="star-rating mb-3">' + stars + '</div><p class="text-gray-300 text-sm mb-4">"' + r.text + '"</p><div class="text-sm"><span class="text-white font-semibold">' + r.author + '</span><span class="text-gray-500">. ' + r.role + ', ' + r.location + '</span></div></div>';
    });

    // FAQ
    document.getElementById('faq-title').innerHTML = c.faq.title.replace('Questions', '<span class="bg-gradient-to-r from-rose-500 to-purple-600 bg-clip-text text-transparent">Questions</span>');
    const faqList = document.getElementById('faq-list');
    c.faq.items.forEach(f => {
      faqList.innerHTML += '<div class="bg-gray-800 rounded-xl p-6 border border-gray-700"><h3 class="font-bold text-white mb-2">' + f.question + '</h3><p class="text-gray-400 text-sm">' + f.answer + '</p></div>';
    });

    // Final CTA
    document.getElementById('final-title').textContent = c.final_cta.title;
    document.getElementById('final-subtitle').textContent = c.final_cta.subtitle;
    document.getElementById('final-cta').textContent = c.final_cta.cta;
    const finalProof = document.getElementById('final-proof');
    c.final_cta.proof.forEach(p => {
      finalProof.innerHTML += '<span class="flex items-center gap-1"><span class="text-green-400">✓</span> ' + p + '</span>';

    });

    // Language selector - highlight current language
    const currentLang = document.documentElement.lang || 'en';
    document.querySelectorAll('.lang-link').forEach(link => {
      if (link.dataset.lang === currentLang) {
        link.classList.remove('bg-gray-800', 'text-gray-400', 'hover:bg-gray-700', 'hover:text-white');
        link.classList.add('bg-rose-500', 'text-white', 'font-medium');
      }
    });
